name: Deploy to GCP

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy-frontend:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Check out project
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm install

      - name: Build frontend for GCS
        run: npm run build
        env:
          VITE_SERVER_URL: https://pander-server-549852174456.us-central1.run.app

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Upload frontend to GCS
        run: gsutil -m rsync -r -d dist/ gs://santyx-landing/turkey/

  deploy-server:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Check out project
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Deploy server to Cloud Run
        run: |
          gcloud run deploy pander-server \
            --project turkey-666 \
            --source ./server \
            --region us-central1 \
            --allow-unauthenticated \
            --set-env-vars "^|^CLIENT_ORIGIN=https://santyx.co,https://storage.googleapis.com|DISCORD_BOT_TOKEN=${{ secrets.DISCORD_BOT_TOKEN }}|DISCORD_CHANNEL_ID=1490106415472443584" \
            --timeout=3600 \
            --session-affinity
